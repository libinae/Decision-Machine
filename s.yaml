# 阿里云函数计算部署配置 - 简化版

edition: 1.0.0
name: decision-machine
access: default

vars:
  region: cn-hangzhou

services:
  decision-machine:
    component: fc
    props:
      region: ${vars.region}

      service:
        name: dm-web-202604052159
        description: 多人格决策机
        internetAccess: true

      function:
        name: dm-api
        description: 决策机 Web API
        runtime: python3.10
        codeUri: ./
        handler: fc_app.app
        timeout: 300
        memorySize: 1024
        environmentVariables:
          DASHSCOPE_API_KEY: ${env.DASHSCOPE_API_KEY}

      triggers:
        - name: httpTrigger
          type: http
          config:
            authType: anonymous
            methods:
              - GET
              - POST
              - PUT
              - DELETE
              - HEAD
              - OPTIONS